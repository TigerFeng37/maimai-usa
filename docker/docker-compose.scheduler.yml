version: '3.8'

# Docker Compose configuration for maimai location updater scheduler
# Run with: docker-compose -f docker/docker-compose.scheduler.yml up -d

services:
  maimai-scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.scheduler
    container_name: maimai-location-scheduler
    restart: unless-stopped
    
    environment:
      # Run update immediately on container start
      - RUN_ON_START=true
      # Fail container if initial update fails
      - FAIL_ON_INIT_ERROR=false
      # Timezone for cron scheduling
      - TZ=America/Los_Angeles
    
    volumes:
      # Mount the data directory to persist updates
      - ../src:/app/src
      # Mount logs for external access
      - ./logs:/app/logs
      # Optional: mount git repository for auto-commits
      # - ../.git:/app/.git
    
    # Optional: if you want to commit changes back to git
    # You'll need to mount SSH keys or use HTTPS with tokens
    # volumes:
    #   - ~/.ssh:/root/.ssh:ro
    #   - ~/.gitconfig:/root/.gitconfig:ro
    
    # Health check
    healthcheck:
      test: ["CMD", "sh", "-c", "find /app/logs -name '*.log' -mmin -1440 | grep -q . || exit 1"]
      interval: 1h
      timeout: 10s
      retries: 3
      start_period: 1m
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Labels for monitoring/management
    labels:
      - "com.maimai-usa.service=location-scheduler"
      - "com.maimai-usa.version=1.0"

  # Optional: nginx container to serve the updated files
  maimai-web:
    image: nginx:alpine
    container_name: maimai-web-server
    restart: unless-stopped
    depends_on:
      - maimai-scheduler
    
    ports:
      - "8080:80"
    
    volumes:
      # Serve the updated location data
      - ../src:/usr/share/nginx/html/data:ro
      # Custom nginx config if needed
      # - ./nginx.conf:/etc/nginx/nginx.conf:ro
    
    environment:
      - TZ=America/Los_Angeles
    
    labels:
      - "com.maimai-usa.service=web-server"
      - "com.maimai-usa.version=1.0"

# Optional: Networks for better isolation
# networks:
#   maimai-network:
#     driver: bridge

# Optional: Named volumes for better data management  
volumes:
  logs:
    driver: local
