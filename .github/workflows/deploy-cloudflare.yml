name: Deploy to Cloudflare Pages

# Deploy your app to Cloudflare Pages using GitHub Actions
# Triggered on pushes to main/master and manual dispatch

on:
  push:
    branches:
      - master
      - main
  
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - preview

# Set permissions for the workflow
permissions:
  contents: read
  deployments: write

jobs:
  # Update location data (keeping your existing logic)
  update-locations:
    runs-on: ubuntu-latest
    
    outputs:
      changes_detected: ${{ steps.update.outputs.changes_detected }}
      update_success: ${{ steps.update.outputs.update_success }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Clear npm cache and install dependencies
      run: |
        npm cache clean --force
        rm -rf node_modules package-lock.json
        npm install
    
    - name: Update location data
      id: update
      run: |
        echo "🔄 Running location data update..."
        
        # Capture the output of the update script
        if npm run update-locations > update_output.log 2>&1; then
          echo "update_success=true" >> $GITHUB_OUTPUT
          echo "✅ Update completed successfully"
        else
          echo "update_success=false" >> $GITHUB_OUTPUT
          echo "❌ Update failed"
          cat update_output.log
          exit 1
        fi
        
        # Check if there are any changes
        if git diff --quiet src/r1index-geocoded.json; then
          echo "changes_detected=false" >> $GITHUB_OUTPUT
          echo "ℹ️ No changes detected in location data"
        else
          echo "changes_detected=true" >> $GITHUB_OUTPUT
          echo "📊 Changes detected in location data"
        fi
        
        # Show the update log
        echo "📋 Update Log:"
        cat update_output.log
    
    - name: Commit changes
      if: steps.update.outputs.changes_detected == 'true'
      run: |
        # Configure git
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Add and commit changes
        git add src/r1index-geocoded.json
        
        # Create commit message with summary
        COMMIT_MSG="🤖 Automated location data update - $(date '+%Y-%m-%d %H:%M:%S UTC')"
        
        # Add change summary to commit message if available
        if [ -f update_output.log ]; then
          SUMMARY=$(grep -E "• (Activated|Deactivated): [0-9]+ locations" update_output.log | head -2 || echo "")
          if [ ! -z "$SUMMARY" ]; then
            COMMIT_MSG="${COMMIT_MSG}"$'\n\n'"${SUMMARY}"
          fi
        fi
        
        git commit -m "$COMMIT_MSG"
    
    - name: Push changes
      if: steps.update.outputs.changes_detected == 'true'
      run: |
        git push
        echo "✅ Changes pushed to repository"

  # Build and deploy to Cloudflare Pages
  deploy:
    needs: update-locations
    runs-on: ubuntu-latest
    if: always() && needs.update-locations.outputs.update_success == 'true'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: master
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Clear npm cache and install dependencies
      run: |
        npm cache clean --force
        rm -rf node_modules package-lock.json
        npm install
    
    - name: Build application
      run: |
        echo "🏗️ Building application..."
        npm run build
        echo "✅ Build completed"
        
        # Show build output directory
        echo "📂 Build output:"
        ls -la dist/
    
    - name: Deploy to Cloudflare Pages
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        projectName: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
        directory: dist
        # Optional: GitHub comment with deployment URL
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create deployment summary
      if: always()
      run: |
        echo "## 🚀 Cloudflare Pages Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ needs.update-locations.outputs.changes_detected }}" = "true" ]; then
          echo "📈 **Data Update**: Location data was updated and deployed" >> $GITHUB_STEP_SUMMARY
        else
          echo "📊 **Data Update**: No changes in location data" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "✅ **Deployment**: Successfully deployed to Cloudflare Pages" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🕐 **Timestamp**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
