name: Update Location Data

# Automated location data updates using GitHub Actions
# Runs hourly, commits changes when detected, and automatically deploys

on:
  schedule:
    - cron: '6 * * * *'  # Run at the 6th minute of every hour
  
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if no changes detected'
        required: false
        default: false
        type: boolean

# Set permissions for the workflow
permissions:
  contents: write
  actions: read
  deployments: write

jobs:
  update-locations:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Use a personal access token with repo permissions
        # Create this as a repository secret named 'GITHUB_TOKEN'
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Clear npm cache and install dependencies
      run: |
        npm cache clean --force
        rm -rf node_modules package-lock.json
        npm install
    
    - name: Update location data
      id: update
      run: |
        echo "🔄 Running location data update with browser automation..."
        
        # Try browser version first, fallback to simple version
        if npm run update-locations-browser > update_output.log 2>&1; then
          echo "update_success=true" >> $GITHUB_OUTPUT
          echo "✅ Browser update completed successfully"
        elif npm run update-locations > update_output.log 2>&1; then
          echo "update_success=true" >> $GITHUB_OUTPUT
          echo "✅ Fallback update completed successfully"
        else
          echo "update_success=false" >> $GITHUB_OUTPUT
          echo "❌ Both update methods failed"
          cat update_output.log
          exit 1
        fi
        
        # Check if there are any changes
        if git diff --quiet src/r1index-geocoded.json; then
          echo "changes_detected=false" >> $GITHUB_OUTPUT
          echo "ℹ️ No changes detected in location data"
        else
          echo "changes_detected=true" >> $GITHUB_OUTPUT
          echo "📊 Changes detected in location data"
        fi
        
        # Show the update log
        echo "📋 Update Log:"
        cat update_output.log
    
    - name: Update recent locations
      id: update_recent
      if: steps.update.outputs.changes_detected == 'true'
      run: |
        echo "🔍 Checking for newly activated locations..."
        
        # Create Node.js script to process recent locations
        cat > process_recent_locations.js << 'EOF'
        const fs = require('fs');
        const { execSync } = require('child_process');

        try {
          // Read current location data
          const currentData = JSON.parse(fs.readFileSync('src/r1index-geocoded.json', 'utf8'));
          
          // Get the last two commits that modified r1index-geocoded.json
          const commits = execSync('git log -2 --pretty=format:"%H" -- src/r1index-geocoded.json')
            .toString()
            .trim()
            .split('\n')
            .filter(h => h);
          
          console.log(`Found ${commits.length} recent commits`);
          
          // Track all newly activated locations
          const newlyActivated = new Set();
          
          // Compare current with previous commits
          for (let i = 0; i < Math.min(commits.length, 2); i++) {
            const commitHash = commits[i];
            console.log(`Checking commit: ${commitHash.substring(0, 7)}`);
            
            try {
              // Get the file content from this commit
              const previousContent = execSync(`git show ${commitHash}:src/r1index-geocoded.json`).toString();
              const previousData = JSON.parse(previousContent);
              
              // Create lookup maps
              const previousMap = new Map(previousData.map(loc => [loc.code, loc]));
              
              // Find newly activated locations
              currentData.forEach(currentLoc => {
                const prevLoc = previousMap.get(currentLoc.code);
                
                // Check if location was inactive before and is now active
                if (currentLoc.active && prevLoc && !prevLoc.active) {
                  newlyActivated.add(currentLoc.code);
                  console.log(`  ✨ Newly activated: ${currentLoc.code} - ${currentLoc.name}`);
                }
              });
            } catch (error) {
              console.log(`  ⚠️ Could not read commit ${commitHash.substring(0, 7)}: ${error.message}`);
            }
          }
          
          // If we found newly activated locations, update recent-locations.json
          if (newlyActivated.size > 0) {
            console.log(`\n📍 Total newly activated locations: ${newlyActivated.size}`);
            
            // Get full data for newly activated locations
            const recentLocations = currentData.filter(loc => newlyActivated.has(loc.code));
            
            // Write to recent-locations.json
            fs.writeFileSync(
              'src/recent-locations.json',
              JSON.stringify(recentLocations, null, 4) + '\n'
            );
            
            console.log(`✅ Updated recent-locations.json with ${recentLocations.length} locations`);
            
            // Output for GitHub Actions
            fs.writeFileSync('recent_locations_updated.flag', 'true');
          } else {
            console.log('ℹ️ No newly activated locations found');
            fs.writeFileSync('recent_locations_updated.flag', 'false');
          }
        } catch (error) {
          console.error('❌ Error processing recent locations:', error.message);
          // Don't fail the workflow, just log the error
          fs.writeFileSync('recent_locations_updated.flag', 'false');
        }
        EOF
        
        # Run the script
        node process_recent_locations.js
        
        # Set output flag
        if [ -f recent_locations_updated.flag ]; then
          UPDATED=$(cat recent_locations_updated.flag)
          echo "recent_locations_updated=$UPDATED" >> $GITHUB_OUTPUT
        fi
    
    - name: Commit changes
      if: steps.update.outputs.changes_detected == 'true' || github.event.inputs.force_update == 'true'
      run: |
        # Configure git
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Add and commit changes
        git add src/r1index-geocoded.json
        
        # Also add recent-locations.json if it was updated
        if [ -f src/recent-locations.json ]; then
          git add src/recent-locations.json
        fi
        
        # Create commit message with summary
        COMMIT_MSG="🤖 Automated location data update - $(date '+%Y-%m-%d %H:%M:%S UTC')"
        
        # Add change summary to commit message if available
        if [ -f update_output.log ]; then
          SUMMARY=$(grep -E "• (Activated|Deactivated): [0-9]+ locations" update_output.log | head -2 || echo "")
          if [ ! -z "$SUMMARY" ]; then
            COMMIT_MSG="${COMMIT_MSG}"$'\n\n'"${SUMMARY}"
          fi
        fi
        
        git commit -m "$COMMIT_MSG"
    
    - name: Push changes
      if: steps.update.outputs.changes_detected == 'true' || github.event.inputs.force_update == 'true'
      run: |
        git push
        echo "✅ Changes pushed to repository"
    
    - name: Build and Deploy
      if: steps.update.outputs.changes_detected == 'true' || github.event.inputs.force_update == 'true'
      run: |
        echo "🚀 Building and deploying updated location data..."
        npm run build
        echo "✅ Build completed successfully"
    
    - name: Deploy to Cloudflare Pages
      if: steps.update.outputs.changes_detected == 'true' || github.event.inputs.force_update == 'true'
      id: deploy
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        projectName: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
        directory: dist
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}
        wranglerVersion: '3'
    
    - name: Create summary
      if: always()
      run: |
        echo "## 📊 Location Update Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.update.outputs.update_success }}" = "true" ]; then
          echo "✅ **Status**: Update completed successfully" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Status**: Update failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ steps.update.outputs.changes_detected }}" = "true" ]; then
          echo "📈 **Changes**: Location data was updated" >> $GITHUB_STEP_SUMMARY
          
          # Add recent locations info if available
          if [ -f recent_locations_updated.flag ]; then
            RECENT_UPDATED=$(cat recent_locations_updated.flag)
            if [ "$RECENT_UPDATED" = "true" ]; then
              echo "✨ **Recent Locations**: Updated with newly activated locations" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          echo "🚀 **Deployment**: Automatically deployed to Cloudflare Pages" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.deploy.outputs.url }}" != "" ]; then
            echo "🌐 **URL**: ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "📊 **Changes**: No changes in location data" >> $GITHUB_STEP_SUMMARY
          echo "⏸️ **Deployment**: Skipped (no changes detected)" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Update Log" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        if [ -f update_output.log ]; then
          cat update_output.log >> $GITHUB_STEP_SUMMARY
        fi
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🕐 **Timestamp**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: update-logs-${{ github.run_number }}
        path: |
          update_output.log
          src/r1index-geocoded-backup-*.json
        retention-days: 30