name: Update Location Data

# Automated location data updates using GitHub Actions
# Runs daily and commits changes back to the repository

on:
  schedule:
    - cron: '6 * * * *'  # Run at the 6th minute of every hour
  
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if no changes detected'
        required: false
        default: false
        type: boolean

# Set permissions for the workflow
permissions:
  contents: write
  actions: read

jobs:
  update-locations:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Use a personal access token with repo permissions
        # Create this as a repository secret named 'GITHUB_TOKEN'
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Clear npm cache and install dependencies
      run: |
        npm cache clean --force
        rm -rf node_modules package-lock.json
        npm install
    
    - name: Update location data
      id: update
      run: |
        echo "🔄 Running location data update with browser automation..."
        
        # Try browser version first, fallback to simple version
        if npm run update-locations-browser > update_output.log 2>&1; then
          echo "update_success=true" >> $GITHUB_OUTPUT
          echo "✅ Browser update completed successfully"
        elif npm run update-locations > update_output.log 2>&1; then
          echo "update_success=true" >> $GITHUB_OUTPUT
          echo "✅ Fallback update completed successfully"
        else
          echo "update_success=false" >> $GITHUB_OUTPUT
          echo "❌ Both update methods failed"
          cat update_output.log
          exit 1
        fi
        
        # Check if there are any changes
        if git diff --quiet src/r1index-geocoded.json; then
          echo "changes_detected=false" >> $GITHUB_OUTPUT
          echo "ℹ️ No changes detected in location data"
        else
          echo "changes_detected=true" >> $GITHUB_OUTPUT
          echo "📊 Changes detected in location data"
        fi
        
        # Show the update log
        echo "📋 Update Log:"
        cat update_output.log
    
    - name: Commit changes
      if: steps.update.outputs.changes_detected == 'true' || github.event.inputs.force_update == 'true'
      run: |
        # Configure git
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Add and commit changes
        git add src/r1index-geocoded.json
        
        # Create commit message with summary
        COMMIT_MSG="🤖 Automated location data update - $(date '+%Y-%m-%d %H:%M:%S UTC')"
        
        # Add change summary to commit message if available
        if [ -f update_output.log ]; then
          SUMMARY=$(grep -E "• (Activated|Deactivated): [0-9]+ locations" update_output.log | head -2 || echo "")
          if [ ! -z "$SUMMARY" ]; then
            COMMIT_MSG="${COMMIT_MSG}"$'\n\n'"${SUMMARY}"
          fi
        fi
        
        git commit -m "$COMMIT_MSG"
    
    - name: Push changes
      if: steps.update.outputs.changes_detected == 'true' || github.event.inputs.force_update == 'true'
      run: |
        git push
        echo "✅ Changes pushed to repository"
    
    - name: Create summary
      if: always()
      run: |
        echo "## 📊 Location Update Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.update.outputs.update_success }}" = "true" ]; then
          echo "✅ **Status**: Update completed successfully" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Status**: Update failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ steps.update.outputs.changes_detected }}" = "true" ]; then
          echo "📈 **Changes**: Location data was updated" >> $GITHUB_STEP_SUMMARY
        else
          echo "📊 **Changes**: No changes in location data" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Update Log" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        if [ -f update_output.log ]; then
          cat update_output.log >> $GITHUB_STEP_SUMMARY
        fi
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🕐 **Timestamp**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: update-logs-${{ github.run_number }}
        path: |
          update_output.log
          src/r1index-geocoded-backup-*.json
        retention-days: 30