name: Update Location Data (Improved)

# Improved automated location data updates
# - Runs daily instead of hourly
# - Creates pull requests for review instead of direct commits
# - Adds data validation and quality checks
# - Better error handling and notifications

on:
  schedule:
    # Run daily at 6:00 AM UTC (avoid peak hours)
    - cron: '0 6 * * *'
  
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      create_pr:
        description: 'Create pull request instead of direct commit'
        required: false
        default: true
        type: boolean
      force_update:
        description: 'Force update even if no changes detected'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  update-locations:
    runs-on: ubuntu-latest
    
    outputs:
      changes_detected: ${{ steps.update.outputs.changes_detected }}
      pr_number: ${{ steps.create-pr.outputs.pr_number }}
      validation_passed: ${{ steps.validate.outputs.validation_passed }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Backup current data
      run: |
        cp src/r1index-geocoded.json src/r1index-geocoded-backup-$(date +%Y%m%d-%H%M%S).json
        echo "📦 Created backup of current data"
    
    - name: Update location data
      id: update
      run: |
        echo "🔄 Running location data update..."
        
        # Try browser version first, fallback to simple version
        if timeout 300 npm run update-locations-browser > update_output.log 2>&1; then
          echo "update_method=browser" >> $GITHUB_OUTPUT
          echo "update_success=true" >> $GITHUB_OUTPUT
          echo "✅ Browser update completed successfully"
        elif timeout 300 npm run update-locations > update_output.log 2>&1; then
          echo "update_method=fallback" >> $GITHUB_OUTPUT
          echo "update_success=true" >> $GITHUB_OUTPUT
          echo "⚠️ Browser failed, fallback update completed successfully"
        else
          echo "update_success=false" >> $GITHUB_OUTPUT
          echo "❌ Both update methods failed"
          cat update_output.log
          exit 1
        fi
        
        # Check if there are any changes
        if git diff --quiet src/r1index-geocoded.json; then
          echo "changes_detected=false" >> $GITHUB_OUTPUT
          echo "ℹ️ No changes detected in location data"
        else
          echo "changes_detected=true" >> $GITHUB_OUTPUT
          echo "📊 Changes detected in location data"
          
          # Show what changed
          echo "📋 Changes summary:"
          git diff --stat src/r1index-geocoded.json
        fi
        
        # Show the update log
        echo "📋 Update Log:"
        cat update_output.log
    
    - name: Validate updated data
      id: validate
      if: steps.update.outputs.changes_detected == 'true'
      run: |
        echo "🔍 Validating updated location data..."
        
        # Check JSON validity
        if ! jq empty src/r1index-geocoded.json 2>/dev/null; then
          echo "❌ Invalid JSON format"
          echo "validation_passed=false" >> $GITHUB_OUTPUT
          exit 1
        fi
        
        # Check required fields exist
        REQUIRED_FIELDS=("code" "name" "city" "state" "lat" "lng" "active")
        TOTAL_LOCATIONS=$(jq length src/r1index-geocoded.json)
        
        echo "📊 Validating $TOTAL_LOCATIONS locations..."
        
        for field in "${REQUIRED_FIELDS[@]}"; do
          MISSING=$(jq --arg field "$field" '[.[] | select(has($field) | not)] | length' src/r1index-geocoded.json)
          if [ "$MISSING" -gt 0 ]; then
            echo "❌ $MISSING locations missing required field: $field"
            echo "validation_passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi
        done
        
        # Check coordinate validity
        INVALID_COORDS=$(jq '[.[] | select(.lat == null or .lng == null or .lat == 0 or .lng == 0)] | length' src/r1index-geocoded.json)
        if [ "$INVALID_COORDS" -gt 0 ]; then
          echo "⚠️ Warning: $INVALID_COORDS locations have invalid coordinates"
        fi
        
        # Count active vs inactive
        ACTIVE_COUNT=$(jq '[.[] | select(.active == true)] | length' src/r1index-geocoded.json)
        INACTIVE_COUNT=$(jq '[.[] | select(.active == false)] | length' src/r1index-geocoded.json)
        
        echo "✅ Validation passed:"
        echo "   - Total locations: $TOTAL_LOCATIONS"
        echo "   - Active: $ACTIVE_COUNT"
        echo "   - Inactive: $INACTIVE_COUNT"
        echo "   - Invalid coordinates: $INVALID_COORDS"
        
        echo "validation_passed=true" >> $GITHUB_OUTPUT
        echo "active_count=$ACTIVE_COUNT" >> $GITHUB_OUTPUT
        echo "inactive_count=$INACTIVE_COUNT" >> $GITHUB_OUTPUT
        echo "total_count=$TOTAL_LOCATIONS" >> $GITHUB_OUTPUT
    
    - name: Create Pull Request
      id: create-pr
      if: steps.update.outputs.changes_detected == 'true' && steps.validate.outputs.validation_passed == 'true' && (github.event.inputs.create_pr != 'false')
      run: |
        # Create a new branch for the update
        BRANCH_NAME="automated-location-update-$(date +%Y%m%d-%H%M%S)"
        git checkout -b "$BRANCH_NAME"
        
        # Configure git
        git config --local user.email "action@github.com"
        git config --local user.name "Location Data Bot"
        
        # Stage changes
        git add src/r1index-geocoded.json src/r1index-geocoded-backup-*.json
        
        # Create commit
        SUMMARY=$(grep -E "• (Activated|Deactivated): [0-9]+ locations" update_output.log | head -2 || echo "Location status updates")
        COMMIT_MSG="🤖 Automated location data update - $(date '+%Y-%m-%d %H:%M:%S UTC')"
        
        if [ ! -z "$SUMMARY" ]; then
          COMMIT_MSG="${COMMIT_MSG}"$'\n\n'"${SUMMARY}"
        fi
        
        COMMIT_MSG="${COMMIT_MSG}"$'\n\n'"📊 Summary:"
        COMMIT_MSG="${COMMIT_MSG}"$'\n'"- Total locations: ${{ steps.validate.outputs.total_count }}"
        COMMIT_MSG="${COMMIT_MSG}"$'\n'"- Active: ${{ steps.validate.outputs.active_count }}"
        COMMIT_MSG="${COMMIT_MSG}"$'\n'"- Inactive: ${{ steps.validate.outputs.inactive_count }}"
        COMMIT_MSG="${COMMIT_MSG}"$'\n'"- Update method: ${{ steps.update.outputs.update_method }}"
        
        git commit -m "$COMMIT_MSG"
        git push origin "$BRANCH_NAME"
        
        # Create PR
        PR_BODY="## 🤖 Automated Location Data Update

This PR contains automated updates to the maimai location data.

### 📊 Summary
- **Total locations**: ${{ steps.validate.outputs.total_count }}
- **Active locations**: ${{ steps.validate.outputs.active_count }}
- **Inactive locations**: ${{ steps.validate.outputs.inactive_count }}
- **Update method**: ${{ steps.update.outputs.update_method }}

### 🔍 Validation
✅ All validation checks passed:
- JSON format is valid
- All required fields are present
- Location data is consistent

### 📋 Changes
$(echo "$SUMMARY")

### 🔗 Links
- [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
- [Download logs and backups](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

---
*This PR was automatically created by the location data updater workflow.*
"
        
        # Create the PR using GitHub CLI
        PR_NUMBER=$(gh pr create \
          --title "🤖 Automated location data update - $(date '+%Y-%m-%d')" \
          --body "$PR_BODY" \
          --head "$BRANCH_NAME" \
          --base "master" \
          --label "automated,location-data" \
          --output json | jq -r '.number')
        
        echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
        echo "✅ Created pull request #$PR_NUMBER"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Direct commit (fallback)
      if: steps.update.outputs.changes_detected == 'true' && steps.validate.outputs.validation_passed == 'true' && github.event.inputs.create_pr == 'false'
      run: |
        # Configure git
        git config --local user.email "action@github.com"
        git config --local user.name "Location Data Bot"
        
        # Add and commit changes
        git add src/r1index-geocoded.json src/r1index-geocoded-backup-*.json
        
        SUMMARY=$(grep -E "• (Activated|Deactivated): [0-9]+ locations" update_output.log | head -2 || echo "")
        COMMIT_MSG="🤖 Automated location data update - $(date '+%Y-%m-%d %H:%M:%S UTC')"
        
        if [ ! -z "$SUMMARY" ]; then
          COMMIT_MSG="${COMMIT_MSG}"$'\n\n'"${SUMMARY}"
        fi
        
        git commit -m "$COMMIT_MSG"
        git push
        echo "✅ Changes committed directly to master"
    
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: location-update-${{ github.run_number }}
        path: |
          update_output.log
          src/r1index-geocoded-backup-*.json
        retention-days: 90
    
    - name: Create job summary
      if: always()
      run: |
        echo "## 📊 Location Update Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.update.outputs.update_success }}" = "true" ]; then
          echo "✅ **Status**: Update completed successfully" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Status**: Update failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ steps.update.outputs.changes_detected }}" = "true" ]; then
          echo "📈 **Changes**: Location data was updated" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.validate.outputs.validation_passed }}" = "true" ]; then
            echo "✅ **Validation**: All checks passed" >> $GITHUB_STEP_SUMMARY
            echo "📊 **Stats**: ${{ steps.validate.outputs.active_count }} active, ${{ steps.validate.outputs.inactive_count }} inactive" >> $GITHUB_STEP_SUMMARY
            
            if [ ! -z "${{ steps.create-pr.outputs.pr_number }}" ]; then
              echo "🔀 **PR Created**: #${{ steps.create-pr.outputs.pr_number }}" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ **Validation**: Failed validation checks" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "📊 **Changes**: No changes in location data" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🕐 **Timestamp**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  # Optional: Auto-merge PRs if they pass all checks
  auto-merge:
    needs: update-locations
    runs-on: ubuntu-latest
    if: needs.update-locations.outputs.pr_number != '' && needs.update-locations.outputs.validation_passed == 'true'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Wait and auto-merge PR
      run: |
        # Wait a bit for any additional checks
        sleep 30
        
        # Auto-merge the PR if it's safe
        gh pr merge ${{ needs.update-locations.outputs.pr_number }} \
          --auto \
          --squash \
          --delete-branch \
          || echo "Auto-merge failed, manual review required"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Deploy after successful update
  deploy:
    needs: [update-locations, auto-merge]
    runs-on: ubuntu-latest
    if: always() && needs.update-locations.result == 'success'
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: master
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies and build
      run: |
        npm ci
        npm run build
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
